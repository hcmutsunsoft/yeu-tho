<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanh Thỏoooo</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<style>
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #0c0211; /* Nền tối dịu */
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        font-family: 'Montserrat', sans-serif;
    }

    .scene {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Hiệu ứng nền Bokeh và hạt ánh sáng */
    .bokeh-background {
        position: absolute;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, rgba(255, 182, 193, 0.05) 0%, rgba(12, 2, 17, 1) 80%);
        opacity: 0.7;
    }

    .name-container {
        z-index: 10;
        position: relative;
        margin-bottom: 20px;
    }

    .name-text {
        color: #f7e2a9; /* Màu vàng kim mềm mại */
        font-family: 'Playfair Display', serif;
        font-style: italic;
        font-size: 60px;
        font-weight: normal;
        text-align: center;
        margin: 0;
        /* Hiệu ứng gradient vàng kim dịu hơn */
        background-image: linear-gradient(to right, #f2d99c 0%, #fffac2 50%, #f2d99c 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
        animation: text-shine 5s ease-in-out infinite alternate;
    }
    @keyframes text-shine {
        0% { background-position: -300px; }
        100% { background-position: 300px; }
    }

    /* Container Trái Tim Hiệu Ứng */
    .heart-effect-container {
        position: absolute;
        width: 500px;
        height: 500px;
        display: flex;
        justify-content: center;
        align-items: center;
        /* margin-top: 50px; */
        z-index: 1;
    }

    /* Định dạng trái tim nhỏ cơ bản (để nhân bản bằng JS) */
    .small-heart {
        position: absolute;
        width: 6px;
        height: 6px;
        background-color: transparent; /* Màu sẽ được gán ngẫu nhiên */
        transform: rotate(-45deg);
        opacity: 0;
        animation: heart-flow 12s infinite ease-out;
        border-radius: 50%; /* Tránh viền sắc cạnh */
    }
    .small-heart::before,
    .small-heart::after {
        content: "";
        position: absolute;
        width: 6px;
        height: 6px;
        background-color: inherit;
        border-radius: 50%;
    }
    .small-heart::before {
        top: -3px;
        left: 0;
    }
    .small-heart::after {
        left: 3px;
        top: 0;
    }

    @keyframes heart-flow {
        0% {
            opacity: 0;
            transform: rotate(-45deg) scale(0.3) translate(0, 0);
        }
        15% {
            opacity: 0.9;
            transform: rotate(-45deg) scale(1) translate(0, 0);
        }
        90% {
            opacity: 0.1;
        }
        100% {
            opacity: 0;
            transform: rotate(-45deg) scale(0.7) translate(var(--end-x), var(--end-y));
        }
    }
</style>
</head>
<body>
<div class="scene">
    <div class="bokeh-background"></div>
    <div class="name-container">
        <h1 class="name-text">Đỗ Huỳnh Thanh Thảo</h1>
    </div>
    <div class="heart-effect-container" id="heart-container">
        </div>
</div>
<script>
    const heartContainer = document.getElementById('heart-container');
    const numberOfHearts = 200;
    const heartRadiusScale = 14; // Quy đổi tọa độ trái tim sang pixel
    const colors = [
        '#ffb3ba', // Pastel Pink
        '#ffc8dd', // Lighter Pink
        '#f78fa9', // Medium Pink
        '#ffffff', // White
        '#fffac2'  // Pale Yellow-ish White
    ];

    // Công thức quỹ đạo trái tim
    function heartTrajectory(t) {
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
        return { x, y };
    }

    function createHearts() {
        for (let i = 0; i < numberOfHearts; i++) {
            const heart = document.createElement('div');
            heart.className = 'small-heart';

            // Gán màu ngẫu nhiên
            heart.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

            // Tính toán vị trí theo quỹ đạo
            const angle = (i / numberOfHearts) * 2 * Math.PI; // Chia đều góc
            const pos = heartTrajectory(angle);

            const x = pos.x * heartRadiusScale;
            const y = pos.y * heartRadiusScale;

            // Đặt vị trí
            heart.style.left = `calc(50% + ${x}px)`;
            heart.style.top = `calc(50% - ${y}px)`; // Đảo ngược y cho CSS

            // Gán animation delay ngẫu nhiên và biến vị trí kết thúc
            heart.style.animationDelay = `${Math.random() * 12}s`;

            // Tạo hiệu ứng luồng: cho trái tim mờ dần và trôi nhẹ ra ngoài
            heart.style.setProperty('--end-x', `${x * 1.05}px`);
            heart.style.setProperty('--end-y', `${-y * 1.05}px`);

            heartContainer.appendChild(heart);
        }
    }

    createHearts();
</script>
</body>
</html>
